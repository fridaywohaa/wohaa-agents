        }
        
        .greeting-text {

            line-height: 1.6;

        }

        }

            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .card:hover {
            border-color: #333;
            transform: translateY(-2px);
        }
        
        .card.completed {
            opacity: 0.5;
            border-color: #222;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .card-emoji {
            font-size: 28px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            flex: 1;
        }
        
        .card-source {
            font-size: 11px;
            color: #555;
            background: #1a1a1a;
            padding: 3px 8px;
            border-radius: 4px;
        }
        
        .card-desc {
            font-size: 14px;
            color: #999;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        
        .card-action {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4a9eff;
            font-size: 13px;
        }
        
        .card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .tag {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #1a1a1a;
            color: #666;
        }
        
        .tag.goal { background: #1a2a1a; color: #4ade80; }
        .tag.learning { background: #1a1a2a; color: #a78bfa; }
        .tag.reminder { background: #2a1a1a; color: #f87171; }
        .tag.opportunity { background: #2a2a1a; color: #fbbf24; }
        
        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px;
            background: #111;
            border-radius: 12px;
            border: 1px solid #222;
        }
        
        .stat {
            flex: 1;
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        
        .stat-label {
            font-size: 11px;
            color: #555;
            margin-top: 2px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #555;
        }
        
        .empty-state .emoji {
            font-size: 40px;
            margin-bottom: 12px;
        }
        
        .timestamp {
            font-size: 11px;
            color: #444;
            text-align: center;
            margin-top: 20px;
        }

            width: 100%;
            padding: 14px;
            background: #222;
            border: 1px solid #333;
            border-radius: 12px;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: #2a2a2a;
            color: #fff;
        }
    </style>
</head>

        // Context-aware greetings
        const greetings = [
            "你有提到想<strong>{goal}</strong>，不如今日focus呢方面？",
            "記得你想做<strong>{goal}</strong>？幾好喎！",
            "基於你既goals，我建議你今日試<strong>{goal}</strong>",
            "你既<strong>{goal}</strong>進展點樣？有嘢我可以幫手？"
        ];

        let currentTasks = [];
        
        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function loadStats() {
            const streak = localStorage.getItem('smartStreak') || 0;
            const completed = localStorage.getItem('smartCompleted') || 0;
            const skipped = localStorage.getItem('smartSkipped') || 0;
            
            document.getElementById('streak').textContent = streak;
            document.getElementById('completed').textContent = completed;
            document.getElementById('skipped').textContent = skipped;
            
            // Check streak
            const lastDate = localStorage.getItem('smartLastDate');
            const today = new Date().toDateString();
            if (lastDate !== today) {
                // Reset daily
            }
        }

        function generateGreeting() {
            const highPriorityGoals = userProfile.goals.filter(g => g.priority === 'high');
            const randomGoal = getRandomItem(highPriorityGoals);
            const template = getRandomItem(greetings);
            
            const greeting = template.replace('{goal}', randomGoal.name);
            document.getElementById('greetingText').innerHTML = greeting;
        }

        function generateTasks() {
            currentTasks = [];
            
            // Get user's priority goals
            const priorityGoals = userProfile.goals.filter(g => g.priority === 'high');
            const otherGoals = userProfile.goals.filter(g => g.priority !== 'high');
            
            // Shuffle
            const shuffledGoals = [...priorityGoals, ...otherGoals].sort(() => Math.random() - 0.5);
            
            // Generate 4-6 tasks from different goals
            let usedGoals = new Set();
            let taskCount = 4 + Math.floor(Math.random() * 3); // 4-6 tasks
            
            for (let i = 0; i < taskCount; i++) {
                const goal = shuffledGoals[i % shuffledGoals.length];
                const templates = taskTemplates[goal.id];
                if (templates) {
                    const task = getRandomItem(templates);
                    currentTasks.push({
                        ...task,
                        goalId: goal.id,
                        goalEmoji: goal.emoji,
                        goalName: goal.name,
                        id: `${goal.id}_${i}`
                    });
                }
            }
            
            // Shuffle tasks
            currentTasks.sort(() => Math.random() - 0.5);
            
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            
            if (currentTasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">✨</div>
                        <div>No tasks right now</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = currentTasks.map((task, index) => `
                <div class="card" id="task_${task.id}" onclick="completeTask('${task.id}')">
                    <div class="card-header">
                        <span class="card-emoji">${task.goalEmoji}</span>
                        <span class="card-title">${task.title}</span>
                        <span class="card-source">${task.goalName}</span>
                    </div>
                    <div class="card-desc">${task.desc}</div>
                    <div class="card-action">
                        <span>→</span> ${task.action}
                    </div>
                    <div class="card-tags" style="margin-top: 12px;">
                        ${task.tags.map(tag => `<span class="tag ${tag}">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
            
            // Update timestamp
            document.getElementById('timestamp').textContent = 
                `Last updated: ${new Date().toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' })}`;
        }

        function completeTask(taskId) {
            const card = document.getElementById(`task_${taskId}`);
            if (card.classList.contains('completed')) {
                // Skip
                card.classList.remove('completed');
                let skipped = parseInt(localStorage.getItem('smartSkipped') || '0');
                localStorage.setItem('smartSkipped', skipped + 1);
            } else {
                // Complete
                card.classList.add('completed');
                let completed = parseInt(localStorage.getItem('smartCompleted') || '0');
                localStorage.setItem('smartCompleted', completed + 1);
                
                // Update streak
                const today = new Date().toDateString();
                const lastDate = localStorage.getItem('smartLastDate');
                if (lastDate !== today) {
                    let streak = parseInt(localStorage.getItem('smartStreak') || '0');
                    localStorage.setItem('smartStreak', streak + 1);
                    localStorage.setItem('smartLastDate', today);
                }
            }
            
            loadStats();
        }

        function refreshTasks() {
            generateTasks();
            generateGreeting();
        }

        // Initialize
        loadStats();
        generateGreeting();
        generateTasks();
    </script>
